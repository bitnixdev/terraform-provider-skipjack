# Build and unit-test on every push / PR.
name: Test

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "examples/**"
  push:
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "examples/**"

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -o terraform-provider-skipjack .
